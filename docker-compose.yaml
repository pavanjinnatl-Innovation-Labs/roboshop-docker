name: roboshop

services:
  mongodb:
    build: ./mongodb
    image: roboshop/mongodb:v1
    container_name: mongodb

  catalogue:
    build: ./catalogue
    image: roboshop/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    image: roboshop/frontend:v1
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment

  redis:
    image: redis:7
    container_name: redis

  user:
    build: ./user
    image: roboshop/user:v1
    container_name: user
    environment:
      MONGO: "true"
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://mongodb:27017/roboshop
    depends_on:
      - redis
      - mongodb
  cart:
    build: ./cart
    image: roboshop/cart:v1
    container_name: cart
    environment:
      REDIS_HOST: redis
      CATALOGUE_HOST: catalogue
      CATALOGUE_PORT: 8080
    depends_on:
    - redis
    - catalogue
  mysql:
    image: roboshop/mysql:v1
    build: ./mysql
    container_name: mysql
    command: --mysql-native-password=ON --innodb-lock_wait_timeout=120
    environment:
      MYSQL_ROOT_PASSWORD: "RoboShop@1"

  shipping:
    build: ./shipping
    image: roboshop/shipping:v1
    container_name: shipping
    environment:
      CART_ENDPOINT: "cart:8080"
      DB_HOST: mysql
    depends_on:
      - mysql
      - cart
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "roboshop"
      RABBITMQ_DEFAULT_PASS: "roboshop123"
  
  payment:
    build: ./payment
    image: roboshop/payment:v1
    container_name: payment
    environment:
      CART_HOST: cart
      CART_PORT: 8080
      USER_HOST: user
      USER_PORT: 8080
      AMPQP_HOST: rabbitmq
      AMPQP_USER: roboshop
      AMPQP_PASS: roboshop123
    depends_on:
      - cart
      - user
      - rabbitmq      
networks:
  default:
    name: roboshop
    driver: bridge
    external: false