name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: mongodb
    container_name: mongodb 
  catalogue:
    build: ./catalogue
    image: catalogue
    container_name: catalogue
    depends_on:
    - mongodb
  frontend:
    build: ./frontend
    image: frontend
    container_name: frontend
    ports:
    - "80:80"


networks:
  default:
   name: roboshop
   driver: bridge
   external: false